<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Redirect "Adwaita Mono" to the Nerd Font variant so Ptyxis (and any
       other app configured for "Adwaita Mono") gets Nerd Font glyphs. -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>Adwaita Mono</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>AdwaitaMono Nerd Font Mono</string>
    </edit>
  </match>
</fontconfig>
